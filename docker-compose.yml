services:
  backend:
    build: .
    container_name: finsight-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./uploads:/app/uploads
      - ./vectorstore:/app/vectorstore

  frontend:
    build: .
    container_name: finsight-frontend

    command: >
      streamlit run frontend/app.py
      --server.address 0.0.0.0
      --server.port 8501

    ports:
      - "8501:8501"

    depends_on:
      - backend

    env_file:
      - .env

    volumes:
      - ./uploads:/app/uploads
      - ./vectorstore:/app/vectorstore